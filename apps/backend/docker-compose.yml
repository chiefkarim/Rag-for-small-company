services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      # Mount the current directory into the container to enable hot-reloading.
      # We exclude .venv to prevent conflicts with the container's environment natively.
      - .:/app
      - /app/.venv
    ports:
      - "8000:8000"
    environment:
      # Override Redis to point to our local docker container
      - REDIS_URL=redis://redis:6379/0
      - REDIS_HOST=redis
    env_file:
      - .env.dev
    command: ["uv", "run", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--reload-exclude", "infrastructure/databases/*"]
    depends_on:
      - redis

  worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - /app/.venv
    ports:
      - "8080:8080"
    environment:
      - DATABASE_LOCAL_PATH=./infrastructure/databases/sqlite/worker.db
      - REDIS_URL=redis://redis:6379/0
      - REDIS_HOST=redis
      - PORT=8080
    env_file:
      - .env.dev
    command: ["scripts/worker_entrypoint.sh"]
    depends_on:
      - redis
